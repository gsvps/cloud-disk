# Worker 名称不在仓库中预填，一键部署时由用户在部署页自行填写
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "cloud-disk"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "KV"

[[r2_buckets]]
binding = "R2"
bucket_name = "cloud-disk-files"

# APP_NAME 不在仓库中预填；部署页留空时应用内默认显示 CloudDisk
