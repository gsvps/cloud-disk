name = "cloud-disk"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"

# 一键部署时会自动创建并绑定；database_name 为默认 D1 名称
[[d1_databases]]
binding = "DB"
database_name = "cloud-disk-db"
migrations_dir = "migrations"

# 一键部署时会自动创建；KV 无独立 name 字段，平台默认以 Worker 名 + binding 命名（如 cloud-disk-KV）
[[kv_namespaces]]
binding = "KV"

# bucket_name 必须与 KV 默认名区分，避免同名冲突
[[r2_buckets]]
binding = "R2"
bucket_name = "cloud-disk-files"

[vars]
APP_NAME = "CloudDisk"
